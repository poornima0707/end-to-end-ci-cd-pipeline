name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/nft-app:${{ github.sha }} .

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/nft-app:${{ github.sha }}
        format: table

    - name: Push Docker Image
      run: |
        docker push \
        ${{ secrets.DOCKER_USERNAME }}/nft-app:${{ github.sha }}
