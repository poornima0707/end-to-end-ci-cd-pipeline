apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfts-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfts-app
  template:
    metadata:
      labels:
        app: nfts-app
    spec:
      containers:
      - name: nfts-appcontainer
        image: devopsdecode/jan-end-to-end-project:v2
        ports:
        - containerPort: 80